<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Image Caption Generator</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

<style>
:root {
  --ink: #0f0e0d;
  --paper: #faf8f4;
  --cream: #f2ede4;
  --amber: #c8873f;
  --amber-light: #e8a85a;
  --amber-pale: #fdf3e7;
  --smoke: #8a8580;
  --rule: rgba(15,14,13,0.12);
  --shadow: 0 4px 24px rgba(15,14,13,0.10);
  --shadow-lg: 0 16px 56px rgba(15,14,13,0.18);
}

*, *::before, *::after {
  margin: 0; padding: 0; box-sizing: border-box;
}

body {
  min-height: 100vh;
  background-color: var(--cream);
  background-image:
    radial-gradient(ellipse 80% 60% at 60% 20%, rgba(200,135,63,0.10) 0%, transparent 60%),
    url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%230f0e0d' fill-opacity='0.025'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
  display: flex;
  align-items: flex-start;
  justify-content: center;
  padding: 48px 20px 80px;
  font-family: 'DM Sans', sans-serif;
}

/* ── Masthead ── */
.masthead {
  text-align: center;
  margin-bottom: 48px;
}

.masthead-rule {
  display: flex;
  align-items: center;
  gap: 16px;
  margin-bottom: 20px;
  color: var(--amber);
}
.masthead-rule::before,
.masthead-rule::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--amber);
  opacity: 0.5;
}

.eyebrow {
  font-family: 'DM Sans', sans-serif;
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--amber);
}

.masthead h1 {
  font-family: 'Playfair Display', Georgia, serif;
  font-size: clamp(2.4rem, 5vw, 3.6rem);
  font-weight: 700;
  color: var(--ink);
  line-height: 1.1;
  margin-bottom: 12px;
}

.masthead h1 em {
  font-style: italic;
  color: var(--amber);
}

.masthead .subtitle {
  font-size: 15px;
  font-weight: 300;
  color: var(--smoke);
  max-width: 380px;
  margin: 0 auto;
  line-height: 1.6;
}

/* ── Layout ── */
.page-wrap {
  width: 100%;
  max-width: 900px;
}

.card {
  background: var(--paper);
  border-radius: 4px;
  box-shadow: var(--shadow-lg);
  overflow: hidden;
  border: 1px solid var(--rule);
}

.card-body {
  padding: 40px 44px;
}

/* ── Upload Zone ── */
.upload-zone {
  border: 1.5px dashed rgba(200,135,63,0.4);
  border-radius: 4px;
  padding: 40px 24px;
  text-align: center;
  cursor: pointer;
  background: var(--amber-pale);
  transition: all 0.25s;
  position: relative;
  margin-bottom: 24px;
}

.upload-zone:hover,
.upload-zone.drag-over {
  border-color: var(--amber);
  background: #fdf0e0;
}

.upload-zone input[type="file"] {
  position: absolute;
  inset: 0;
  opacity: 0;
  cursor: pointer;
  width: 100%;
  height: 100%;
}

.upload-icon {
  font-size: 40px;
  margin-bottom: 14px;
  display: block;
}

.upload-label {
  font-size: 16px;
  font-weight: 500;
  color: var(--ink);
  display: block;
  margin-bottom: 6px;
}

.upload-hint {
  font-size: 13px;
  color: var(--smoke);
}

.file-name {
  margin-top: 14px;
  font-size: 13px;
  color: var(--amber);
  font-weight: 500;
  display: none;
}

/* ── CTA Button ── */
.btn-generate {
  width: 100%;
  padding: 18px 24px;
  background: var(--ink);
  color: var(--paper);
  font-family: 'DM Sans', sans-serif;
  font-size: 14px;
  font-weight: 500;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  border: none;
  border-radius: 4px;
  cursor: pointer;
  transition: all 0.3s;
  position: relative;
  overflow: hidden;
}

.btn-generate::after {
  content: '';
  position: absolute;
  inset: 0;
  background: var(--amber);
  transform: scaleX(0);
  transform-origin: left;
  transition: transform 0.4s cubic-bezier(.22,.68,0,1.2);
  z-index: 0;
}

.btn-generate:hover::after {
  transform: scaleX(1);
}

.btn-generate span {
  position: relative;
  z-index: 1;
}

.btn-generate:active {
  transform: translateY(1px);
}

/* ── Divider ── */
.section-divider {
  display: flex;
  align-items: center;
  gap: 20px;
  margin: 36px 0;
  color: var(--smoke);
  font-size: 12px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
}
.section-divider::before,
.section-divider::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--rule);
}

/* ── Preview ── */
.preview-container {
  display: none;
  margin-bottom: 36px;
  position: relative;
}

.preview-frame {
  border-radius: 4px;
  overflow: hidden;
  box-shadow: var(--shadow);
  border: 1px solid var(--rule);
  background: var(--ink);
  aspect-ratio: unset;
  max-height: 420px;
  display: flex;
  align-items: center;
  justify-content: center;
}

.preview-frame img {
  width: 100%;
  max-height: 420px;
  object-fit: contain;
  display: block;
}

.preview-badge {
  position: absolute;
  top: -1px;
  left: -1px;
  background: var(--amber);
  color: white;
  font-size: 10px;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  padding: 5px 12px;
  font-weight: 600;
}

/* ── Loader ── */
.loader-area {
  display: none;
  padding: 36px 0;
  text-align: center;
}

.loader-dots {
  display: flex;
  justify-content: center;
  gap: 10px;
  margin-bottom: 18px;
}

.loader-dots span {
  width: 10px;
  height: 10px;
  background: var(--amber);
  border-radius: 50%;
  animation: pulse-dot 1.2s ease-in-out infinite;
}

.loader-dots span:nth-child(2) { animation-delay: 0.2s; }
.loader-dots span:nth-child(3) { animation-delay: 0.4s; }

@keyframes pulse-dot {
  0%, 80%, 100% { transform: scale(0.7); opacity: 0.4; }
  40% { transform: scale(1); opacity: 1; }
}

.loader-text {
  font-size: 13px;
  color: var(--smoke);
  letter-spacing: 0.1em;
  text-transform: uppercase;
}

/* ── Caption Box ── */
.caption-box {
  display: none;
  background: var(--paper);
  border: 1px solid var(--rule);
  border-top: 3px solid var(--amber);
  border-radius: 4px;
  overflow: hidden;
  animation: slide-up 0.4s cubic-bezier(.16,1,.3,1) both;
}

@keyframes slide-up {
  from { opacity: 0; transform: translateY(16px); }
  to   { opacity: 1; transform: translateY(0); }
}

.caption-header {
  padding: 16px 24px;
  background: var(--amber-pale);
  border-bottom: 1px solid var(--rule);
  display: flex;
  align-items: center;
  gap: 10px;
}

.caption-header-icon {
  font-size: 16px;
}

.caption-header-label {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--amber);
}

.caption-content {
  padding: 28px 28px;
}

/* Caption option cards */
.caption-options {
  display: flex;
  flex-direction: column;
  gap: 14px;
}

.caption-option {
  display: flex;
  gap: 16px;
  padding: 16px 18px;
  background: var(--cream);
  border-radius: 4px;
  border: 1px solid var(--rule);
  transition: border-color 0.2s, background 0.2s;
  cursor: pointer;
  position: relative;
  animation: fade-in-card 0.4s ease both;
}

.caption-option:nth-child(1) { animation-delay: 0.05s; }
.caption-option:nth-child(2) { animation-delay: 0.10s; }
.caption-option:nth-child(3) { animation-delay: 0.15s; }
.caption-option:nth-child(4) { animation-delay: 0.20s; }

@keyframes fade-in-card {
  from { opacity: 0; transform: translateX(-8px); }
  to   { opacity: 1; transform: translateX(0); }
}

.caption-option:hover {
  border-color: var(--amber-light);
  background: var(--amber-pale);
}

.option-num {
  min-width: 26px;
  height: 26px;
  background: var(--amber);
  color: white;
  font-size: 11px;
  font-weight: 700;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  margin-top: 1px;
}

.option-body {
  flex: 1;
}

.option-tag {
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--smoke);
  margin-bottom: 6px;
}

.option-text {
  font-family: 'Playfair Display', Georgia, serif;
  font-size: 16px;
  color: var(--ink);
  line-height: 1.55;
}

.copy-btn {
  position: absolute;
  top: 12px;
  right: 12px;
  width: 28px;
  height: 28px;
  background: transparent;
  border: 1px solid var(--rule);
  border-radius: 4px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 12px;
  color: var(--smoke);
  transition: all 0.2s;
  opacity: 0;
}

.caption-option:hover .copy-btn {
  opacity: 1;
}

.copy-btn:hover {
  background: var(--amber);
  color: white;
  border-color: var(--amber);
}

/* Plain caption (no options) */
.caption-plain {
  font-family: 'Playfair Display', Georgia, serif;
  font-size: 17px;
  line-height: 1.65;
  color: var(--ink);
}

/* ── Footer ── */
.card-footer {
  padding: 16px 44px;
  background: var(--cream);
  border-top: 1px solid var(--rule);
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.footer-badge {
  font-size: 11px;
  color: var(--smoke);
  letter-spacing: 0.08em;
}

.footer-badge strong {
  color: var(--amber);
  font-weight: 600;
}

.footer-ornament {
  font-size: 18px;
  opacity: 0.4;
}

/* ── Responsive ── */
@media (max-width: 600px) {
  .card-body { padding: 28px 22px; }
  .card-footer { padding: 14px 22px; }
  .masthead h1 { font-size: 2rem; }
}
</style>
</head>

<body>

<div class="page-wrap">

  <div class="masthead">
    <div class="masthead-rule">
      <span class="eyebrow">Powered by AI</span>
    </div>
    <h1>Image <em>Caption</em><br>Generator</h1>
    <p class="subtitle">Upload a photograph. Receive beautifully crafted caption options in seconds.</p>
  </div>

  <div class="card">
    <div class="card-body">

      <!-- Upload Zone -->
      <div class="upload-zone" id="uploadZone">
        <input type="file" id="imageInput" accept="image/*">
        <span class="upload-icon">🖼</span>
        <span class="upload-label">Drop your image here</span>
        <span class="upload-hint">or click to browse — JPG, PNG, WEBP</span>
        <div class="file-name" id="fileName"></div>
      </div>

      <button class="btn-generate" onclick="generateCaption()">
        <span>✦ &nbsp;Generate Caption</span>
      </button>

      <!-- Preview -->
      <div class="preview-container" id="previewContainer">
        <div class="section-divider">Preview</div>
        <div class="preview-frame">
          <img id="previewImage" alt="Uploaded preview">
        </div>
        <div class="preview-badge">Uploaded</div>
      </div>

      <!-- Loader -->
      <div class="loader-area" id="loader">
        <div class="loader-dots">
          <span></span><span></span><span></span>
        </div>
        <div class="loader-text">Crafting your captions…</div>
      </div>

      <!-- Caption Box -->
      <div class="caption-box" id="captionBox">
        <div class="caption-header">
          <span class="caption-header-icon">✦</span>
          <span class="caption-header-label">Generated Captions</span>
        </div>
        <div class="caption-content">
          <div id="captionText"></div>
        </div>
      </div>

    </div>

    <div class="card-footer">
      <span class="footer-badge">Powered by <strong>AMAN KUMAR</strong></span>
      <span class="footer-ornament">◈</span>
    </div>
  </div>

</div>

<script>
// ── Drag & drop styling ──
const zone = document.getElementById('uploadZone');
zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('drag-over'); });
zone.addEventListener('dragleave', () => zone.classList.remove('drag-over'));
zone.addEventListener('drop', e => { e.preventDefault(); zone.classList.remove('drag-over'); });

// ── File name display ──
document.getElementById('imageInput').addEventListener('change', function() {
  const fn = document.getElementById('fileName');
  if (this.files[0]) {
    fn.textContent = '📎 ' + this.files[0].name;
    fn.style.display = 'block';
  }
});

// ── Render captions ──
function renderCaptions(raw) {
  const container = document.getElementById('captionText');

  const tagMap = ['Timeless', 'Evocative', 'Short & Sweet', 'Mysterious', 'Lyrical', 'Playful', 'Poetic'];

  // Strategy 1 — **Option N (label):** "text"
  const boldPattern = /\*\*Option\s*(\d+)[^*]*\*\*[:\s]*"?([^"*\n]+)"?/gi;
  const boldMatches = [...raw.matchAll(boldPattern)];
  if (boldMatches.length >= 2) {
    return buildCards(boldMatches.map(m => ({ num: m[1], text: m[2].trim().replace(/^["']|["']$/g, '') })));
  }

  // Strategy 2 — plain numbered list: "1. text 2. text" or "1. text\n2. text"
  // Split on boundaries like ". 2." or newline + digit
  const splitItems = raw
    .replace(/\s*(\d+)\.\s+/g, '\n$1. ')   // normalise to newline-separated
    .split('\n')
    .map(l => l.match(/^(\d+)\.\s+(.+)/))
    .filter(Boolean);

  if (splitItems.length >= 2) {
    return buildCards(splitItems.map(m => ({ num: m[1], text: m[2].trim().replace(/^["']|["']$/g, '') })));
  }

  // Strategy 3 — bold items without "Option" keyword: **text**
  const boldItems = [...raw.matchAll(/\*\*([^*]{5,})\*\*/g)];
  if (boldItems.length >= 2) {
    return buildCards(boldItems.map((m, i) => ({ num: String(i + 1), text: m[1].trim() })));
  }

  // Fallback — single clean paragraph
  const clean = raw.replace(/\*\*/g, '').replace(/\*/g, '').replace(/^[^:]+:\s*/,'').trim();
  container.innerHTML = `<p class="caption-plain">${clean}</p>`;

  function buildCards(items) {
    let html = '<div class="caption-options">';
    items.forEach((item, i) => {
      const tag = tagMap[i] || `Option ${item.num}`;
      const safe = item.text.replace(/"/g, '&quot;').replace(/'/g, '&#39;');
      html += `
        <div class="caption-option">
          <div class="option-num">${item.num}</div>
          <div class="option-body">
            <div class="option-tag">${tag}</div>
            <div class="option-text">${item.text}</div>
          </div>
          <button class="copy-btn" title="Copy" onclick="copyText(this, '${safe}')">⎘</button>
        </div>`;
    });
    html += '</div>';
    container.innerHTML = html;
  }
}

function copyText(btn, text) {
  navigator.clipboard.writeText(text).then(() => {
    btn.textContent = '✓';
    setTimeout(() => btn.textContent = '⎘', 1500);
  });
}

// ── Main function (unchanged logic) ──
async function generateCaption() {
  const file = document.getElementById('imageInput').files[0];

  if (!file) {
    alert('Please select an image.');
    return;
  }

  const preview      = document.getElementById('previewImage');
  const previewCont  = document.getElementById('previewContainer');
  const loader       = document.getElementById('loader');
  const captionBox   = document.getElementById('captionBox');

  preview.src = URL.createObjectURL(file);
  previewCont.style.display = 'block';

  loader.style.display    = 'block';
  captionBox.style.display = 'none';

  const formData = new FormData();
  formData.append('image', file);

  try {
    const response = await fetch('/caption', {
      method: 'POST',
      body: formData
    });

    const data = await response.json();

    if (data.error) throw new Error(data.error);

    renderCaptions(data.caption);
    captionBox.style.display = 'block';
  } catch (error) {
    console.error(error);
    document.getElementById('captionText').innerHTML =
      '<p class="caption-plain">Failed to generate caption. Please try again.</p>';
    captionBox.style.display = 'block';
  } finally {
    loader.style.display = 'none';
  }
}
</script>

</body>
</html>
